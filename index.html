<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sideline</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏒</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            field: '#0a0f0d',
            turf: '#0d1a13',
            stripe: '#111c16',
            chalk: '#e8ede9',
            dim: '#6b7c70',
            live: '#39ff14',
            electric: '#00d4ff',
            glow: '#ff2d78',
            score: '#f0fdf4',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Mono', 'monospace'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script type="module" src="components/game-card.js"></script>
  <script type="module" src="components/play-feed.js"></script>
  <script type="module" src="components/sport-selector.js"></script>
  <script type="module" src="app.js"></script>
  <style>
    body { background-color: #0a0f0d; color: #e8ede9; }
    .ticker-dot {
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .play-item {
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    game-card[selected] button { border-color: rgba(0,212,255,0.3) !important; background-color: rgba(0,212,255,0.05) !important; }
    scrollbar-width: thin;
    scrollbar-color: #1e3326 transparent;
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e3326; border-radius: 2px; }
  </style>
</head>
<body class="min-h-screen font-sans">

  <!-- Header -->
  <header class="border-b border-white/5 px-6 py-4 flex items-center justify-between sticky top-0 z-10" style="background:#0a0f0d;">
    <div class="flex items-center gap-3">
      <span class="font-mono font-semibold text-lg tracking-tight text-score">SIDELINE</span>
      <span class="text-dim text-xs font-mono">live play-by-play</span>
    </div>
    <div id="poll-status" class="flex items-center gap-2 text-xs font-mono text-dim">
      <span class="ticker-dot w-2 h-2 rounded-full bg-live inline-block"></span>
      <span id="poll-label">connecting...</span>
    </div>
  </header>

  <!-- Sport Selector -->
  <div class="px-6 pt-5 pb-3">
    <sport-selector></sport-selector>
  </div>

  <!-- Main layout -->
  <main class="px-6 pb-10 grid grid-cols-1 lg:grid-cols-3 gap-5 max-w-7xl mx-auto">

    <!-- Games panel -->
    <section class="lg:col-span-1">
      <h2 class="text-xs font-mono text-dim uppercase tracking-widest mb-3">Today's Games</h2>
      <div id="games-list" class="space-y-2">
        <p class="text-dim text-sm font-mono">Loading...</p>
      </div>
    </section>

    <!-- Play-by-play panel -->
    <section class="lg:col-span-2">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xs font-mono text-dim uppercase tracking-widest">Play-by-Play</h2>
        <span id="selected-game-label" class="text-xs font-mono text-dim">select a game</span>
      </div>
      <div id="play-feed-container">
        <play-feed></play-feed>
      </div>
    </section>

  </main>

</body>
</html>
